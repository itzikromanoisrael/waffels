<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>התשלום לא הושלם | WAFFELS</title>
  <style>
    :root {
      --bg: #fff8fb;
      --card: rgba(255,255,255,0.92);
      --line: rgba(123, 56, 94, 0.12);
      --text: #3c2433;
      --muted: #7e6170;
      --pink: #e85aa8;
      --pink-deep: #d53f93;
      --warning: #a0662a;
      --shadow: 0 26px 58px rgba(128, 64, 98, 0.15);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(232, 90, 168, 0.18), transparent 24%),
        linear-gradient(180deg, #fffafc 0%, #fff1f7 100%);
      color: var(--text);
    }

    .card {
      width: min(100%, 680px);
      padding: 32px;
      border-radius: 32px;
      background: var(--card);
      border: 1px solid var(--line);
      backdrop-filter: blur(18px) saturate(160%);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.9rem);
      line-height: 1.1;
      font-family: Georgia, "Times New Roman", serif;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.85;
    }

    .status {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(160, 102, 42, 0.12);
      color: var(--warning);
      font-weight: 700;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(123, 56, 94, 0.12);
      color: var(--text);
      background: rgba(255,255,255,0.8);
    }

    .btn-primary {
      border: 0;
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--pink-deep));
      box-shadow: 0 18px 30px rgba(232, 90, 168, 0.24);
    }

    @media (max-width: 640px) {
      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>התשלום לא הושלם</h1>
    <p>המקדמה עדיין לא נקלטה, ולכן השעה עוד לא נשמרה סופית. אפשר לחזור לאתר, או לבקש מאורטל לשלוח שוב את קישור המקדמה.</p>
    <div class="status">כל עוד התשלום לא הושלם, התור נשאר במצב ממתין למקדמה ולא נחסם באופן סופי.</div>
    <div class="actions">
      <a class="btn btn-primary" href="./index.html#booking">חזרה לאתר</a>
      <a class="btn" href="./admin.html">מעבר למסך הניהול</a>
    </div>
  </main>
</body>
</html>
